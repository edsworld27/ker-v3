<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      window.__caught = [];
      window.addEventListener('error', e => window.__caught.push({type:'error', msg:e.message, src:e.filename, line:e.lineno, col:e.colno, stack:(e.error&&e.error.stack)?e.error.stack.slice(0,2000):''}));
      window.addEventListener('unhandledrejection', e => window.__caught.push({type:'rejection', msg:String(e.reason), stack:(e.reason&&e.reason.stack)?e.reason.stack.slice(0,2000):''}));
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
